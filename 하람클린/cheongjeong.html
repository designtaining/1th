<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .cheongjeong_main {
            width: 100%;
            height: 960px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cheongjeong_video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            z-index: 1;
        }

        .cheongjeong_main_shadow {
            width: 100%;
            height: 100%;
            background-color: rgba(17, 17, 17, 0.7);
            z-index: 2;
        }

        .cheongjeong_main_wrapper {
            width: 1000px;
            height: 960px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            z-index: 3;
        }

        .cheongjeong_main_ring {
            width: 600px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            z-index: 4;
            animation: cheongjeong_rotate 24s linear infinite;
        }

        @keyframes cheongjeong_rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .cheongjeong_main_ring>img {
            width: 100%;
            height: 100%;
        }

        .cheongjeong_main_logo {
            width: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            z-index: 5;
        }

        .cheongjeong_main_logo>img {
            width: 100%;
            height: 100%;
        }

        /* ✅ 768px 이하 */
        @media screen and (max-width: 768px) {
            .cheongjeong_main {
                height: 800px;
            }

            .cheongjeong_main_wrapper {
                width: 100%;
                height: 800px;
            }

            .cheongjeong_main_ring {
                width: 400px;
                height: 400px;
            }

            .cheongjeong_main_logo {
                width: 240px;
            }
        }

        /* ✅ 440px 이하 */
        @media screen and (max-width: 440px) {
            .cheongjeong_main {
                height: 720px;
            }

            .cheongjeong_main_wrapper {
                width: 100%;
                height: 720px;
            }

            .cheongjeong_main_ring {
                width: 260px;
                height: 260px;
            }

            .cheongjeong_main_logo {
                width: 180px;
            }
        }
    </style>
</head>

<body>

    <section class="cheongjeong_main">
        <video class="cheongjeong_video" autoplay muted loop playsinline>
            <source src="https://ncryk7.mycafe24.com/haram01.mp4" type="video/mp4">
        </video>
        <div class="cheongjeong_main_shadow"></div>
        <div class="cheongjeong_main_wrapper">
            <div class="cheongjeong_main_ring">
                <img src="https://ncryk7.mycafe24.com/cheongjeong_main_ring.png" alt="">
            </div>
            <div class="cheongjeong_main_logo">
                <img src="https://ncryk7.mycafe24.com/cheongjeong_main_logo.png" alt="">
            </div>
        </div>
    </section>

</body>

</html>
