        .haram1_container {
            width: 100%;
        }

        .haram1_wrapper {
            width: 100%;
            display: flex;
            flex-direction: row;
            gap: 20px;
        }

        .haram1_left {
            width: 50%;
            height: 100%;
            transform: translateY(-20px);
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: flex-end;
        }

        .haram1_right {
            width: 50%;
            height: 100%;
            transform: translateY(20px);
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: flex-start;
        }

        .haram1_box {
            width: 240px;
            height: 240px;
            border-radius: 16px;
            display: flex;
            align-items: flex-end;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        .haram1_box:nth-child(1) {
            background-image: url(https://cdn.imweb.me/thumbnail/20260424/bed64f834b554.png);
            background-size: cover;
        }

        .haram1_box:nth-child(2) {
            background-image: url(https://cdn.imweb.me/thumbnail/20260424/bed64f834b554.png);
            background-size: cover;
        }

        .haram1_box:nth-child(3) {
            background-image: url(https://cdn.imweb.me/thumbnail/20260424/bed64f834b554.png);
            background-size: cover;
        }

        .haram1_box:nth-child(4) {
            background-image: url(https://cdn.imweb.me/thumbnail/20260424/bed64f834b554.png);
            background-size: cover;
        }

        .haram1_box_titlebox {
            position: absolute;
            z-index: 2;
        }

        .haram1_title {
            font-family: 'A2z';
            font-weight: 500;
            font-size: 20px;
            color: #ffffff;
            line-height: 1.4;
            margin: 0;
        }

        .haram1_desc {
            font-family: 'A2z';
            font-weight: 300;
            font-size: 12px;
            color: #ffffff;
            line-height: 1.4;
            margin: 0;
        }
            .haram1_box_shadow {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;

                background: linear-gradient(to top, #111111, transparent);
                border-radius: 16px;
            }
    </style>

<body>

    <div class="haram1_container">

                    <div class="haram1_box_titlebox">
                        <p class="haram1_desc">Home cleaning</p>

                            홈클리닝

            <div class="haram1_right">
