<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        @font-face {
            font-family: 'A2z';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-1Thin.woff2') format('woff2');
            font-weight: 100;
            font-display: swap;
        }

        @font-face {
            font-family: 'A2z';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-2ExtraLight.woff2') format('woff2');
            font-weight: 200;
            font-display: swap;
        }

        @font-face {
            font-family: 'A2z';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-3Light.woff2') format('woff2');
            font-weight: 300;
            font-display: swap;
        }

        @font-face {
            font-family: 'A2z';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-4Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }

        @font-face {
            font-family: 'A2z';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-5Medium.woff2') format('woff2');
            font-weight: 500;
            font-display: swap;
        }

        @font-face {
            font-family: 'A2z';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-6SemiBold.woff2') format('woff2');
            font-weight: 600;
            font-display: swap;
        }

        @font-face {
            font-family: 'A2z';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-7Bold.woff2') format('woff2');
            font-weight: 700;
            font-display: swap;
        }

        @font-face {
            font-family: 'A2z';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-8ExtraBold.woff2') format('woff2');
            font-weight: 800;
            font-display: swap;
        }

        @font-face {
            font-family: 'A2z';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/에이투지체-9Black.woff2') format('woff2');
            font-weight: 900;
            font-display: swap;
        }

        .gnb_container {
            width: 100%;
            height: 60px;
            background-color: #ffffff;
            border-bottom: 1px solid #e5e5ec;
            box-shadow: 0 4px 12px rgba(17, 17, 17, 0.05);
            position: fixed !important;
            top: 0;
            z-index: 10;
        }

        .gnb_wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 120px;
            box-sizing: border-box;
            gap: 20px;
        }

        .gnb_top {
            width: 1000px;
            display: flex;
            justify-content: space-between;
        }

        .straight {
            text-decoration: none;
            font-family: 'A2z';
            font-size: 16px;
            font-weight: 300;
            color: #111111;
            transition: all 0.3s ease;
        }

        .straight:hover {
            color: #767676;
        }

        .gnb_bottom {
            width: 100%;
            display: flex;
            margin-top: 12px;
        }

        .gnb_tel {
            width: 100%;
            margin: 0 auto;
            text-decoration: none;
            display: flex;
            justify-content: flex-end;
            padding: 0 20px;
        }

        .gnb_tel_box {
            padding: 16px 32px;
            background-color: #ffffff;
            border: 1px solid #e5e5ec;
            border-radius: 999px;
            box-shadow: 0 4px 12px rgba(17, 17, 17, 0.07);
        }

        .gnb_callnumber {
            font-family: 'A2z';
            font-size: 16px;
            font-weight: 400;
            color: #111111;
            margin: 0;
        }

        /* ✅ 1024px 이하 */
        @media screen and (max-width: 1024px) {
            .gnb_wrapper {
                padding: 0 16px;
                gap: 20px;
            }

            .gnb_top {
                width: 100%;
            }

            .gnb_tel {
                width: 100%;
                padding: 0 16px;
            }
        }

        /* ✅ 768px 이하 */
        @media screen and (max-width: 768px) {
            .gnb_container {
                height: 40px;
            }

            .straight {
                font-size: 14px;
            }

            .gnb_tel_box {
                padding: 12px 24px;
            }

            .gnb_callnumber {
                font-size: 14px;
            }
        }

        /* ✅ 440px 이하 */
        @media screen and (max-width: 440px) {
            .gnb_container {
                height: 40px;
            }

            .straight {
                font-size: 12px;
            }

            .gnb_tel_box {
                padding: 10px 20px;
            }

            .gnb_callnumber {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <div class="gnb_container">
        <div class="gnb_wrapper">
            <div class="gnb_top">
                <a href="" class="straight">투입시간</a>
                <a href="" class="straight">청소범위</a>
                <a href="" class="straight">가전청소</a>
                <a href="" class="straight">현장추가비용안내</a>
            </div>
        </div>
        <div class="gnb_bottom">
            <a href="tel:01000000000" class="gnb_tel">
                <div class="gnb_tel_box">
                    <p class="gnb_callnumber">
                        0507-0000-0000
                    </p>
                </div>
            </a>
        </div>
    </div>

</body>

</html>
