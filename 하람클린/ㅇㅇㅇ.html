<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="https://kit.fontawesome.com/9bc17173c2.js" crossorigin="anonymous"></script>

    <style>
        .concept_container {
            width: 100%;
            padding: 100px 0;
        }

        .concept_wrapper {
            display: flex;
            flex-direction: column;
            gap: 40px;
            aspect-ratio: 16 / 7;
            width: 90%;
            height: 800px;
            margin: 0 auto;
        }

        .concept_title {
            font-family: 'Pretendard';
            font-size: 60px;
            font-weight: 700;
            color: #111111;
            margin: 0;
        }

        .concept_box {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 60px;
            padding: 60px;
            background-color: #ebeffc;
            border: 1px solid #e5e5ec;
            border-radius: 12px;
            box-sizing: border-box;
        }

        .concept_top_box {
            width: 100%;
            display: flex;
            justify-content: space-between;
        }

        .concept_left {
            display: flex;
            gap: 8px;
            flex-wrap: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
        }

        .concept_category {
            border: 1px solid #e5e5ec;
            border-radius: 8px;
            padding: 16px 24px;
            background-color: #ffffff;
            box-shadow: 0 4px 12px rgba(17, 17, 17, 0.05);
            font-family: 'Pretendard';
            font-size: 16px;
            font-weight: 300;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            flex: 0 0 auto;
            white-space: nowrap;
            word-break: keep-all;
            min-width: max-content;
        }

        .concept_right {
            display: flex;
            gap: 8px;
        }

        .concept_arrow_left,
        .concept_arrow_right {
            padding: 16px;
            background-color: #ffffff;
            border: 1px solid #e5e5ec;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(17, 17, 17, 0.05);
            cursor: pointer;
        }

        .arl {
            transform: rotateZ(-90deg);
            font-size: 20px;
        }

        .arr {
            transform: rotateZ(90deg);
            font-size: 20px;
        }

        .concept_bottom_box {
            display: flex;
            gap: 60px;
            overflow: hidden;
            flex-wrap: nowrap;
        }

        .concept_item {
            width: 400px;
            height: 400px;
            background-color: #ffffff;
            border: 1px solid #e5e5ec;
            border-radius: 12px;
            position: relative;
            display: flex;
            align-items: flex-end;
            flex: 0 0 400px;
            cursor: pointer;
            overflow: hidden;

        }

        .concept_item>img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: inherit;
            position: absolute;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .concept_item:hover img {
            transform: scale(1.04);
        }

        .concept_item_title_box {
            position: absolute;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            border-radius: 8px;
            border: 1px solid #e5e5ec;
            gap: 4px;
            z-index: 2;
            padding: 24px;
        }

        .concept_item_title {
            font-family: 'Pretendard';
            font-size: 16px;
            font-weight: 500;
            color: #111111;
            margin: 0;
        }

        .concept_item_desc {
            font-family: 'Pretendard';
            font-size: 20px;
            font-weight: 700;
            color: #111111;
            margin: 0;
        }

        /* 스크롤 가능 + 스크롤바 숨김 + 드래그 중 텍스트 선택 방지 */
        .concept_left,
        .concept_bottom_box {
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .concept_left::-webkit-scrollbar,
        .concept_bottom_box::-webkit-scrollbar {
            display: none;
        }

        .is-dragging {
            cursor: default;
        }

        /* ✅ 1280px 이하 */
        @media screen and (max-width: 1280px) {
            .concept_top_box {
                flex-direction: column;
                gap: 40px;
            }

            .concept_box {
                gap: 40px;
                padding: 40px;
            }
        }

        /* ✅ 1024px 이하 */
        @media screen and (max-width: 1024px) {
            .concept_title {
                font-size: 40px;
            }

            .concept_wrapper {
                gap: 20px;
                aspect-ratio: 16 / 7;
                width: 100%;
                height: 720px;
                padding: 0 16px;
            }

            .concept_top_box {
                flex-direction: column;
                gap: 20px;
            }

            .concept_box {
                gap: 20px;
                padding: 20px;
            }

            .concept_bottom_box {
                gap: 40px;
            }

            .concept_item {
                width: 360px;
                height: 360px;
                flex: 0 0 360px;

            }

            .concept_item>img {
                width: 360px;
                height: 360px;
            }
        }

        /* ✅ 768px 이하 */
        @media screen and (max-width: 768px) {
            .concept_title {
                font-size: 32px;
            }

            .concept_wrapper {
                height: 600px;
            }

            .concept_top_box {
                gap: 16px;
            }

            .concept_box {
                gap: 16px;
                padding: 16px;
            }

            .concept_bottom_box {
                gap: 16px;
            }

            .concept_item {
                width: 320px;
                height: 320px;
                flex: 0 0 320px;

            }

            .concept_item>img {
                width: 320px;
                height: 320px;
            }

            .concept_item_title_box {
                padding: 20px;
            }

            .concept_item_title {
                font-size: 12px;
            }

            .concept_item_desc {
                font-size: 16px;
            }
        }

        /* ✅ 440px 이하 */
        @media screen and (max-width: 440px) {
            .concept_item {
                width: 100%;
                aspect-ratio: 1 / 1;
                flex: 0 0 100%;
                box-sizing: border-box;
            }

            .concept_item>img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                border-radius: inherit;
                box-sizing: border-box;
            }
        }
    </style>

    <section class="concept_container">

                <div class="concept_bottom_box">
                    <div class="concept_item">
                        <img src="https://ncryk7.mycafe24.com/concept1p1.png" alt="">
                        <div class="concept_item_title_box">
                            <p class="concept_item_title">풀해상도</p>

                        </div>
                    </div>
                    <div class="concept_item">
                        <img src="https://ncryk7.mycafe24.com/concept1p2.png" alt="">
                        <div class="concept_item_title_box">
                            <p class="concept_item_title">고해상도</p>
                            <p class="concept_item_desc">1580</p>
                        </div>
                    </div>
                    <div class="concept_item">
                        <img src="https://ncryk7.mycafe24.com/concept1p3.png" alt="">
                        <div class="concept_item_title_box">
                            <p class="concept_item_title">고해상도</p>
                            <p class="concept_item_desc">1560</p>
                        </div>
                    </div>
                    <div class="concept_item">
                        <img src="https://ncryk7.mycafe24.com/concept1p4.png" alt="">
                        <div class="concept_item_title_box">
                            <p class="concept_item_title">저해상도</p>
                            <p class="concept_item_desc">1320</p>
                        </div>
                    </div>
                    <div class="concept_item">
                        <img src="https://ncryk7.mycafe24.com/concept1p5.png" alt="">
                        <div class="concept_item_title_box">
                            <p class="concept_item_title">저해상도</p>
                            <p class="concept_item_desc">1280</p>
                        </div>
                    </div>
                    <div class="concept_item">
                        <img src="https://ncryk7.mycafe24.com/concept1p6.png" alt="">
                        <div class="concept_item_title_box">
                            <p class="concept_item_title">태블릿</p>
                            <p class="concept_item_desc">1024-</p>
                        </div>
                    </div>
                    <div class="concept_item">
                        <img src="https://ncryk7.mycafe24.com/concept1p7.png" alt="">
                        <div class="concept_item_title_box">
                            <p class="concept_item_title">핸드폰</p>
                            <p class="concept_item_desc">360+</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <script>
        /* ==== 데이터: 카테고리별 아이템 ==== */
        const DATA = {
            "레이아웃": [
                { title: "풀해상도", desc: "1920", img: "https://ncryk7.mycafe24.com/concept1p1.png" },
                { title: "고해상도", desc: "1580", img: "https://ncryk7.mycafe24.com/concept1p2.png" },
                { title: "고해상도", desc: "1560", img: "https://ncryk7.mycafe24.com/concept1p3.png" },
                { title: "저해상도", desc: "1320", img: "https://ncryk7.mycafe24.com/concept1p4.png" },
                { title: "저해상도", desc: "1280", img: "https://ncryk7.mycafe24.com/concept1p5.png" },
                { title: "태블릿", desc: "1024-", img: "https://ncryk7.mycafe24.com/concept1p6.png" },
                { title: "핸드폰", desc: "360+", img: "https://ncryk7.mycafe24.com/concept1p7.png" },
            ],
            "브랜드컬러": [
                { title: "", desc: "2types", img: "https://ncryk7.mycafe24.com/concept3p1.png" },
                { title: "", desc: "2types", img: "https://ncryk7.mycafe24.com/concept3p2.png" },
                { title: "", desc: "3types", img: "https://ncryk7.mycafe24.com/concept3p3.png" },
                { title: "", desc: "3types", img: "https://ncryk7.mycafe24.com/concept3p4.png" },
                { title: "", desc: "4types", img: "https://ncryk7.mycafe24.com/concept3p5.png" },
                { title: "", desc: "4types", img: "https://ncryk7.mycafe24.com/concept3p6.png" },
            ],
            "타이포그래피": [
                { title: "", desc: "Pretendard", img: "https://ncryk7.mycafe24.com/concept2p1.png" },
                { title: "", desc: "IBM Plex Sans KR", img: "https://ncryk7.mycafe24.com/concept2p2.png" },
                { title: "", desc: "SUIT", img: "https://ncryk7.mycafe24.com/concept2p3.png" },
                { title: "", desc: "Gmarket Sans", img: "https://ncryk7.mycafe24.com/concept2p4.png" },
                { title: "", desc: "Spoqa Han sans Neo", img: "https://ncryk7.mycafe24.com/concept2p5.png" },
                { title: "", desc: "Nanum Gothic", img: "https://ncryk7.mycafe24.com/concept2p6.png" },
                { title: "", desc: "Noto Sans KR", img: "https://ncryk7.mycafe24.com/concept2p7.png" },
            ],
            "이미지": [
                { title: "", desc: "인물", img: "https://ncryk7.mycafe24.com/concept4p1.png" },
                { title: "", desc: "캐릭터", img: "https://ncryk7.mycafe24.com/concept4p2.png" },
                { title: "", desc: "애니메이션", img: "https://ncryk7.mycafe24.com/concept4p3.png" },
                { title: "", desc: "컬러형", img: "https://ncryk7.mycafe24.com/concept4p4.png" },
                { title: "", desc: "풍경", img: "https://ncryk7.mycafe24.com/concept4p5.png" },
                { title: "", desc: "제품형", img: "https://ncryk7.mycafe24.com/concept4p6.png" },
                { title: "", desc: "제품형(음식)", img: "https://ncryk7.mycafe24.com/concept4p7.png" },
            ],
            "컨텐츠": [
                { title: "", desc: "지도", img: "https://ncryk7.mycafe24.com/concept5p1.png" },
                { title: "", desc: "동영상", img: "https://ncryk7.mycafe24.com/concept5p2.png" },
                { title: "", desc: "갤러리", img: "https://ncryk7.mycafe24.com/concept5p3.png" },
                { title: "", desc: "쇼핑", img: "https://ncryk7.mycafe24.com/concept5p4.png" },
                { title: "", desc: "예약", img: "https://ncryk7.mycafe24.com/concept5p5.png" },
                { title: "", desc: "설문지", img: "https://ncryk7.mycafe24.com/concept5p6.png" },
            ],
            "UIUX": [
                { title: "", desc: "색배경", img: "https://ncryk7.mycafe24.com/concept6p1.png" },
                { title: "", desc: "사진배경", img: "https://ncryk7.mycafe24.com/concept6p2.png" },
                { title: "", desc: "이미지형 박스", img: "https://ncryk7.mycafe24.com/concept6p3.png" },
                { title: "", desc: "각진 테두리", img: "https://ncryk7.mycafe24.com/concept6p4.png" },
                { title: "", desc: "둥근 테두리", img: "https://ncryk7.mycafe24.com/concept6p5.png" },
                { title: "", desc: "이미지간 간격", img: "https://ncryk7.mycafe24.com/concept6p6.png" },
            ],
        };

        /* ==== 엘리먼트 ==== */
        const categoryRow = document.querySelector(".concept_left");
        const categories = [...document.querySelectorAll(".concept_category")];
        const bottomBox = document.querySelector(".concept_bottom_box");
        const btnLeft = document.querySelector(".concept_arrow_left");
        const btnRight = document.querySelector(".concept_arrow_right");

        /* ==== 카드 이동 간격 계산 ==== */
        function getStep(container) {
            const gap = parseInt(getComputedStyle(container).gap || "0", 10);
            const firstItem = container.querySelector(".concept_item");
            if (!firstItem) return 400 + gap; // 기본 추정
            const rect = firstItem.getBoundingClientRect();
            return Math.round(rect.width) + gap;
        }

        /* ==== 하단 아이템 렌더 (인라인 크기 제거) ==== */
        function renderBottom(categoryLabel) {
            const list = DATA[categoryLabel] || [];
            bottomBox.innerHTML = list.map(item => `
    <div class="concept_item">
      <img src="${item.img}" alt="">
      <div class="concept_item_title_box">
        <p class="concept_item_title">${item.title}</p>
        <p class="concept_item_desc">${item.desc}</p>
      </div>
    </div>
  `).join("");

            enableDragScroll(bottomBox);                 // 새 DOM에 드래그 바인딩
            bottomBox.scrollTo({ left: 0, behavior: "instant" }); // 시작 위치 초기화
        }

        /* ==== 카테고리 클릭 ==== */
        categories.forEach(cat => {
            cat.addEventListener("click", () => {
                renderBottom(cat.textContent.trim());
            });
        });

        /* ==== 좌우 화살표: 카드 1칸씩 이동 ==== */
        function scrollByOne(direction = 1) {
            const step = getStep(bottomBox);
            const target = bottomBox.scrollLeft + direction * step;
            bottomBox.scrollTo({ left: target, behavior: "smooth" });
        }
        btnLeft.addEventListener("click", () => scrollByOne(-1));
        btnRight.addEventListener("click", () => scrollByOne(1));

        /* ==== 드래그 스크롤 공통 유틸 ==== */
        function enableDragScroll(el) {
            // 중복 바인딩 방지: 이미 바인딩되어 있으면 건너뜀
            if (el.__dragBound) return;
            el.__dragBound = true;

            let isDown = false;
            let startX = 0;
            let startScroll = 0;

            const onDown = (clientX) => {
                isDown = true;
                startX = clientX;
                startScroll = el.scrollLeft;
                el.classList.add("is-dragging");
            };
            const onMove = (clientX) => {
                if (!isDown) return;
                const dx = clientX - startX;
                el.scrollLeft = startScroll - dx;
            };
            const onUp = () => {
                isDown = false;
                el.classList.remove("is-dragging");
            };

            el.addEventListener("mousedown", (e) => { onDown(e.clientX); });
            window.addEventListener("mousemove", (e) => { onMove(e.clientX); });
            window.addEventListener("mouseup", onUp);

            el.addEventListener("touchstart", (e) => { onDown(e.touches[0].clientX); }, { passive: true });
            el.addEventListener("touchmove", (e) => { onMove(e.touches[0].clientX); }, { passive: true });
            el.addEventListener("touchend", onUp);

            el.addEventListener("dragstart", (e) => e.preventDefault());
        }

        /* ==== 하단 드래그 스크롤: 항상 활성 ==== */
        enableDragScroll(bottomBox);

        /* ==== 상단 카테고리 드래그: 1024px 이하에서만 ==== */
        const mediaQuery = window.matchMedia("(max-width: 1024px)");
        function bindOrUnbindCategoryDrag() {
            if (mediaQuery.matches) {
                enableDragScroll(categoryRow);   // 바인딩(중복 방지 포함)
            } else {
                // 주요 시작 이벤트만 제거해서 드래그 비활성화
                categoryRow.onmousedown = null;
                categoryRow.ontouchstart = null;
            }
        }
        bindOrUnbindCategoryDrag();
        mediaQuery.addEventListener("change", bindOrUnbindCategoryDrag);

        /* ==== 리사이즈 대응(스텝 재계산 트리거 용) ==== */
        window.addEventListener("resize", () => {
            getStep(bottomBox);
        });
    </script>

    </body>

</html>
