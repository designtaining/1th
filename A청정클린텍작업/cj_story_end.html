<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-1Thin.woff2') format('woff2');
            font-weight: 100;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-2ExtraLight.woff2') format('woff2');
            font-weight: 200;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-3Light.woff2') format('woff2');
            font-weight: 300;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2') format('woff2');
            font-weight: 500;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-6SemiBold.woff2') format('woff2');
            font-weight: 600;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');
            font-weight: 700;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-8ExtraBold.woff2') format('woff2');
            font-weight: 800;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');
            font-weight: 900;
            font-display: swap;
        }

        .cj_end_container {
            width: 100%;
            height: 100vh;
        }

        .cj_end_wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cj_end_cp {
            font-family: 'Paperozi';
            font-size: 80px;
            font-weight: 500;
            color: #111111;
            text-align: center;
            line-height: 1.4;
        }

        .cj_end_span1 {
            color: #1800a0;
        }

        @keyframes cjEndGradient {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .cj_end_span2 {
            position: relative;
            display: inline-block;

            font-weight: 700;
            background: linear-gradient(90deg,
                    #2e50e2,
                    #8b5cf6,
                    #1428A0,
                    #68d5ff,
                    #2e50e2);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: cjEndGradient 3s ease-in-out infinite;
        }

        .cj_end_span2::after {
            content: '';
            position: absolute;

            top: -12px;
            right: -18px;

            width: 14px;
            height: 14px;
            border-radius: 50%;

            background: radial-gradient(circle,
                    #2e50e2 0%,
                    #2e50e2 50%,
                    #8b5cf6 100%);

            opacity: 0;
            transform: scale(0);

            box-shadow:
                0 0 1px #2e50e2,
                0 0 1px #8b5cf6,
                0 0 2px #2e50e2;
        }

        .cj_end_span2.active::after {
            animation: sparklePop .8s ease-out forwards;
        }

        @keyframes sparklePop {
            0% {
                opacity: 0;
                transform: scale(0) translateY(6px);
                filter: blur(2px);
            }

            55% {
                opacity: 1;
                transform: scale(1.35) translateY(-2px);
                filter: blur(0);
            }

            100% {
                opacity: .95;
                transform: scale(1) translateY(0);
                filter: blur(0);
            }
        }
    </style>
</head>

<body>
    <section class="cj_end_container">
        <div class="cj_end_wrapper">
            <p class="cj_end_cp">
                <span class="cj_end_span1">청정클린텍</span>
                솔루션 <br> <span class="cj_end_span2">
                    지금 바로 시작하세요</span>
            </p>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const target = document.querySelector('.cj_end_container');
            const sparkle = document.querySelector('.cj_end_span2');

            const observer = new IntersectionObserver(function (entries) {
                entries.forEach(function (entry) {
                    if (entry.isIntersecting) {
                        sparkle.classList.remove('active');

                        void sparkle.offsetWidth;

                        sparkle.classList.add('active');
                    }
                });
            }, {
                threshold: 0.7
            });

            observer.observe(target);
        });
    </script>

</body>

</html>
