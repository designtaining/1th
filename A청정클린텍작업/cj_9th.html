<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-1Thin.woff2') format('woff2');
            font-weight: 100;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-2ExtraLight.woff2') format('woff2');
            font-weight: 200;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-3Light.woff2') format('woff2');
            font-weight: 300;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2') format('woff2');
            font-weight: 500;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-6SemiBold.woff2') format('woff2');
            font-weight: 600;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');
            font-weight: 700;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-8ExtraBold.woff2') format('woff2');
            font-weight: 800;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');
            font-weight: 900;
            font-display: swap;
        }

        .cj_ninth_container {
            width: 100%;
            height: 100vh;
        }

        .cj_ninth_wrapper {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            padding: 0 160px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cj_ninth_box {
            width: auto;
            height: auto;
            display: flex;
            flex-direction: column;
            gap: 80px;
            display: flex;
            justify-content: center;
        }

        .cj_ninth_top {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .cj_ninth_subtitle {
            font-family: 'Paperozi';
            font-size: 18px;
            font-weight: 300;
            color: #ffffff;
            letter-spacing: 1.5px;
            margin: 0;
        }

        .cj_ninth_title {
            font-family: 'Paperozi';
            font-size: 48px;
            font-weight: 400;
            color: #ffffff;
            margin: 0;
        }

        .cj_ninth_bottom {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .cj_ninth_catchphrase {
            font-family: 'Paperozi';
            font-size: 26px;
            font-weight: 300;
            color: #ffffff;
            letter-spacing: 1.5px;
            margin: 0;
        }

        .cj_ninth_desc {
            font-family: 'Paperozi';
            font-size: 16px;
            font-weight: 300;
            color: #ffffff;
            letter-spacing: 1.5px;
            margin: 0;
        }

        .cj_ninth_notification {
            width: 320px;
            height: 320px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cj_ninth_ring {
            position: absolute;
            z-index: 1;
            width: 100%;
            height: 100%;
            animation: cjRingRotate 20s linear infinite;
        }

        .cj_ninth_ring>img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        @keyframes cjRingRotate {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .cj_ninth_bt {
            position: absolute;
            z-index: 2;
            text-decoration: none;
            padding: 12px 24px;
            border: 1px solid #ffffff;
            font-family: 'Paperozi';
            font-weight: 300;
            color: #ffffff !important;
        }

        .cj_ninth_bt:hover {
            background-color: #ffffff;
            color: #111111 !important;
        }

        /* ✅ 1024px 이하 */
        @media screen and (max-width: 1024px) {

            .cj_ninth_wrapper {
                padding: 0 12px;
                flex-direction: column;
                justify-content: space-between;
                align-items: flex-start;
            }

            .cj_ninth_box {
                gap: 60px;
            }

            .cj_ninth_top {
                gap: 8px;
            }

            .cj_ninth_subtitle {
                font-size: 16px;
                letter-spacing: 2px;
            }

            .cj_ninth_title {
                font-size: 40px;
            }

            .cj_ninth_bottom {
                gap: 16px;
            }

            .cj_ninth_catchphrase {
                font-size: 20px;
                letter-spacing: 2px;
            }

            .cj_ninth_notification {
                margin: auto auto 0 auto;
                width: 320px;
                height: 320px;
            }
        }

        /* ✅ 440px 이하 */
        @media screen and (max-width: 440px) {

            .cj_ninth_box {
                gap: 20px;
            }

            .cj_ninth_subtitle {
                letter-spacing: 0;
            }

            .cj_ninth_title {
                font-size: 24px;
            }

            .cj_ninth_bottom {
                gap: 16px;
            }

            .cj_ninth_catchphrase {
                font-size: 12px;
                letter-spacing: 0;
            }
        }
    </style>


</head>

<body>

    <section class="cj_ninth_container">
        <div class="cj_ninth_wrapper">

            <div class="cj_ninth_box">
                <div class="cj_ninth_top">
                    <p class="cj_ninth_subtitle">시작부터 마무리까지 빠짐없이</p>
                    <p class="cj_ninth_title">BEST SERVICE PROMISE</p>
                </div>
                <div class="cj_ninth_bottom">
                    <p class="cj_ninth_catchphrase">
                        저희 업체를 선택해주신 고객님께,
                        <br>
                        후회 없는 서비스를 제공하기 위해서
                        <br>
                        최선의 노력으로 보답하겠습니다.
                    </p>
                </div>
            </div>

            <div class="cj_ninth_notification">
                <div class="cj_ninth_ring">
                    <img src="https://ncryk7.mycafe24.com/cheongjeong_main_ring.png" alt="">
                </div>
                <a href="" class="cj_ninth_bt">
                    안내페이지 보기
                </a>
            </div>

        </div>
    </section>

</body>

</html>
