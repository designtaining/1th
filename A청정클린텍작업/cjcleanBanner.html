        .cj_banner_container {
            width: 100%;
            height: 100%;
        }

        .cj_banner_wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cj_banner_video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1; 
        }

        .cj_banner_box {
            position: absolute;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .cj_banner_title_pc {
            font-family: 'A2z';
            font-size: 40px;
            font-weight: 700;
            color: #111111;
        }

        .cj_banner_bt_pc {
            padding: 8px 40px;
            border: 2px solid #ffffff;
            border-radius: 12px;
            background-color: rgba(17, 17, 17, 0.05);
            font-family: 'A2z';
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
        }
        
    </style>
</head>

<body>

    <section class="cj_banner_container">
        <div class="cj_banner_wrapper">
            <video class="cj_banner_video" autoplay muted loop playsinline>
                <source src="https://ncryk7.mycafe24.com/cjcleantech_pc2.mp4" type="video/mp4">
            </video>
            <div class="cj_banner_box">
                <p class="cj_banner_title_pc">
                    청정이 드리는 정성

                </a>
                <p class="cj_banner_title_mb">

                </p>
                <a href="" class="cj_banner_bt_mb"></a>
            </div>
        </div>
    </section>
