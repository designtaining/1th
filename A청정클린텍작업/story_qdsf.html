            font-weight: 400;
            font-display: swap;
        }

        @font-face {

            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2') format('woff2');
            font-weight: 500;

            font-weight: 600;

            font-weight: 700;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-8ExtraBold.woff2') format('woff2');
            font-weight: 800;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');
            font-weight: 900;
            font-display: swap;
        }

        .cj_ks_container {
            width: 100%;
            height: 100%;
        }

        .cj_ks_wrapper {
            width: 100%;
            height: 100%;
        }

        .cj_ks_box {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
        }

        .cj_ks_left {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .cj_ks_title {
            font-family: 'Paperozi';
            font-size: 32px;
            font-weight: 500;
            color: #ffffff;
            margin: 0;
            line-height: 1.4;
        }

        .cj_ks_desc {
            font-family: 'Paperozi';
            font-size: 20px;
            font-weight: 400;
            color: #ffffff;
            margin: 0;
            line-height: 1.5;
        }

        .cj_ks_right {
            display: flex;
            flex-direction: row;
            gap: 20px;
            overflow: hidden;
            height: 400px;
        }

        .cj_ks_1s {
            display: flex;
            flex-direction: column;
            gap: 20px;
            will-change: transform;
        }

        .cj_ks_ss {
            width: 240px;
            height: 240px;
            overflow: hidden;
            border-radius: 12px;
            flex-shrink: 0;
        }

        .cj_ks_ss>img {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
            object-position: center;
            display: block;
        }
    </style>
</head>

<body>

    <section class="cj_ks_container">

        <div class="cj_ks_wrapper">

            <div class="cj_ks_box">

                <div class="cj_ks_left">

                    <p class="cj_ks_title">
                        우리는 이를 원천적으로 해소하기 위한 컬비 시스템을
                        <br>
                        합리적인 가격에 제공하고 있습니다.
                    </p>

                    <p class="cj_ks_desc">
                        어린시절부터 오랫동안 천식을 앓아왔던 경험을 바탕으로,
                        <br>
                        이에 대한 솔루션을 포함한 매뉴얼을 자체적으로 제작하였습니다.
                        <br>
                        업종의 시작 전,후 수없는 시행착오로 만들어진 144시간의 교육과정은
                        <br>
                        고객님들께 우리 가치를 보여줄 수 있는 자신감이 되었습니다.
                        <br>
                        청정클린텍은 컬비 시스템을 최고수준으로 사용할 수 있으며,
                        <br>
                        브랜드 만족도 대상 수상으로 증명합니다.
                    </p>

                </div>

                <div class="cj_ks_right">
                    <div class="cj_ks_1s">
                        <div class="cj_ks_ss">
                            <img src="https://cdn.imweb.me/thumbnail/20260515/92c27f6b3e787.png" alt="">
                        </div>
                        <div class="cj_ks_ss">
                            <img src="https://cdn.imweb.me/thumbnail/20260515/92c27f6b3e787.png" alt="">
                        </div>
                        <div class="cj_ks_ss">
                            <img src="https://cdn.imweb.me/thumbnail/20260515/92c27f6b3e787.png" alt="">
                        </div>
                        <div class="cj_ks_ss">
                            <img src="https://cdn.imweb.me/thumbnail/20260515/92c27f6b3e787.png" alt="">
                        </div>
                    </div>
                    <div class="cj_ks_1s">
                        <div class="cj_ks_ss">
                            <img src="https://cdn.imweb.me/thumbnail/20260515/92c27f6b3e787.png" alt="">
                        </div>
                        <div class="cj_ks_ss">
                            <img src="https://cdn.imweb.me/thumbnail/20260515/92c27f6b3e787.png" alt="">
                        </div>
                        <div class="cj_ks_ss">
                            <img src="https://cdn.imweb.me/thumbnail/20260515/92c27f6b3e787.png" alt="">
                        </div>
                        <div class="cj_ks_ss">
                            <img src="https://cdn.imweb.me/thumbnail/20260515/92c27f6b3e787.png" alt="">
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </section>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const columns = document.querySelectorAll(".cj_ks_1s");
            const speed = 0.35;

            columns.forEach(function (column, index) {

                let isPaused = false;

                column.addEventListener("mouseenter", () => {
                    isPaused = true;
                });

                column.addEventListener("mouseleave", () => {
                    isPaused = false;
                });

                column.innerHTML += column.innerHTML;

                const originalHeight = column.scrollHeight / 2;
                let y = index === 0 ? -originalHeight : 0;
                const direction = index === 0 ? 1 : -1;

                function animate() {

                    if (!isPaused) {

                        y += direction * speed;

                        if (direction === 1 && y >= 0) {
                            y = -originalHeight;
                        }

                        if (direction === -1 && y <= -originalHeight) {
                            y = 0;
                        }

                        column.style.transform = `translateY(${y}px)`;
                    }

                    requestAnimationFrame(animate);
                }

                animate();
            });
        });
    </script>

</body>

</html>
