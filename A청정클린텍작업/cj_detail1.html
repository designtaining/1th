            font-display: swap;

            font-family: 'Paperozi';

            font-weight: 500;
            font-display: swap;

            font-family: 'Paperozi';

            font-display: swap;

            font-weight: 700;
            font-display: swap;

        @font-face {

            font-display: swap;

        }

        .detail1_container {
            width: 100%;
            height: auto;
        }

        .detail1_wrapper {

            height: auto;
        }

            width: 100%;
            height: auto;
            display: flex;
            flex-direction: column;

            gap: 40px;
        }

        .detail1_top {
            display: flex;
            justify-content: center;
        }

        .detail1_saying {
            font-family: 'Paperozi';
            font-size: 20px;
            font-weight: 300;
            color: #ffffff;
            margin: 0;
        }

        .detail1_bottom {
            width: 400px;
            height: 400px;
            border-radius: 999px;
        }

        .detail1_bottom>img {
            width: 100%;
            height: 100%;
            border-radius: 999px;
        }
    </style>
</head>

<body>

    <section class="detail1_container">
        <div class="detail1_wrapper">
            <div class="detail1_box">
                <div class="detail1_top">
                    <p class="detail1_saying">

                    </p>
                </div>
                <div class="detail1_bottom">
