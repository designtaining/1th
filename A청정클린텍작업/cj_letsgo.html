<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="https://kit.fontawesome.com/9bc17173c2.js" crossorigin="anonymous"></script>

    <style>
        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-1Thin.woff2') format('woff2');
            font-weight: 100;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-2ExtraLight.woff2') format('woff2');
            font-weight: 200;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-3Light.woff2') format('woff2');
            font-weight: 300;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2') format('woff2');
            font-weight: 500;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-6SemiBold.woff2') format('woff2');
            font-weight: 600;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');
            font-weight: 700;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-8ExtraBold.woff2') format('woff2');
            font-weight: 800;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');
            font-weight: 900;
            font-display: swap;
        }

        .cj_more_container {
            width: 100%;
            height: 100%;
        }

        .cj_more_wrapper {
            width: 100%;
            height: 100%;
            padding: 20px 160px;
            box-sizing: border-box;
        }

        .cj_more_box {
            width: 100%;
            height: 160px;
            display: flex;
            flex-direction: row;
            gap: 20px;
        }

        .cj_more_blog,
        .cj_more_youtube,
        .cj_more_insta {
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 1px solid #e4e4e4;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(17, 17, 17, 0.2);
            padding: 40px;
            text-decoration: none;
            gap: 20px;
            transition: all 0.3s ease;
        }

        .cj_more_blog,
        .cj_more_youtube {
            flex: 1;
        }

        .cj_more_insta {
            flex: 2;
        }

        .cj_more_blog:hover,
        .cj_more_youtube:hover,
        .cj_more_insta:hover {
            transform: translateY(-4px);
        }

        .cj_more_titlebox {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .cj_more_title {
            font-family: 'Paperozi';
            font-size: 12px;
            font-weight: 400;
            color: #111111 !important;
            margin: 0;
        }

        .cj_more_desc {
            font-family: 'Paperozi';
            font-size: 16px;
            font-weight: 400;
            color: #111111 !important;
            margin: 0;
        }

        .fa-blog {
            font-size: 28px;
            color: #03c75a;
        }

        .fa-youtube {
            font-size: 28px;
            color: #ff0033;
        }

        .fa-instagram {
            font-size: 28px;
            display: inline-block;
            background: linear-gradient(90deg, #71cbff 0%, #fa00a0 50%, #fec000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ✅ 1024px 이하 */
        @media screen and (max-width: 1024px) {
            .cj_more_wrapper {
                width: 100%;
                height: 100%;
                padding: 20px 20px;
                box-sizing: border-box;
            }
        }

        /* ✅ 768px 이하 */
        @media screen and (max-width: 768px) {
            .cj_more_box {
                height: auto;
                flex-direction: column;
                gap: 12px;
            }

            .cj_more_blog,
            .cj_more_youtube,
            .cj_more_insta {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                padding: 24px;
                gap: auto;
            }

            .cj_more_titlebox {
                align-items: flex-end;
            }
        }

        /* ✅ 440px 이하 */
        @media screen and (max-width: 440px) {
            .cj_more_box {
                gap: 8px;
            }

            .cj_more_blog,
            .cj_more_youtube,
            .cj_more_insta {
                padding: 20px;
            }

            .cj_more_title {
                font-size: 10px;
            }

            .cj_more_desc {
                font-size: 14px;
            }

            .fa-blog,
            .fa-youtube,
            .fa-instagram{
                font-size: 22px;
            }
        }
    </style>
</head>

<body>

    <section class="cj_more_container">

        <div class="cj_more_wrapper">

            <div class="cj_more_box">
                <a href="https://blog.naver.com/cjlife_" target="_blank" rel="noopener noreferrer" class="cj_more_blog">
                    <i class="fa-solid fa-blog"></i>
                    <div class="cj_more_titlebox">
                        <p class="cj_more_title">BLOG</p>
                        <p class="cj_more_desc">블로그 보기</p>
                    </div>
                </a>
                <a href="" class="cj_more_youtube">
                    <i class="fa-brands fa-youtube"></i>
                    <div class="cj_more_titlebox">
                        <p class="cj_more_title">YOUTUBE</p>
                        <p class="cj_more_desc">유튜브 보기</p>
                    </div>
                </a>
                <a href="https://www.instagram.com/cj_clean_tech" target="_blank" rel="noopener noreferrer"
                    class="cj_more_insta">
                    <i class="fa-brands fa-instagram"></i>
                    <div class="cj_more_titlebox">
                        <p class="cj_more_title">INSTAGRAM</p>
                        <p class="cj_more_desc">인스타그램 보기</p>
                    </div>
                </a>
            </div>

        </div>

    </section>

</body>

</html>
