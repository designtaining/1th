<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="https://kit.fontawesome.com/9bc17173c2.js" crossorigin="anonymous"></script>

    <style>
        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-1Thin.woff2') format('woff2');
            font-weight: 100;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-2ExtraLight.woff2') format('woff2');
            font-weight: 200;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-3Light.woff2') format('woff2');
            font-weight: 300;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2') format('woff2');
            font-weight: 500;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-6SemiBold.woff2') format('woff2');
            font-weight: 600;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');
            font-weight: 700;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-8ExtraBold.woff2') format('woff2');
            font-weight: 800;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');
            font-weight: 900;
            font-display: swap;
        }

        .cj_gnb_container {
            width: 100%;
            height: 80px;
            background-color: transparent;
            position: fixed !important;
            top: 0;
            z-index: 14;
            transition: all 0.3s ease;
        }

        .cj_gnb_container.scrolled {
            background-color: #ffffff;
            box-shadow: 0 4px 12px rgba(17, 17, 17, 0.05);
        }

        .cj_gnb_container.scrolled .cj_menu {
            color: #111111 !important;
        }

        .cj_gnb_container.scrolled .cj_hamburger {
            color: #111111 !important;
        }

        .cj_gnb_wrapper {
            width: 100%;
            height: 100%;
            padding: 0 40px;
            box-sizing: border-box;
        }

        .cj_gnb_box {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
        }

        .cj_logo {
            width: 135px;
            height: 42px;
        }

        .cj_logo>img {
            width: 100%;
            height: 100%;
        }

        .cj_gnb_menu {
            display: flex;
            flex-direction: row;
            gap: 60px;
        }

        .cj_menu {
            font-family: 'Paperozi';
            font-size: 20px;
            font-weight: 400;
            color: #111111 !important;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .cj_menu:hover {
            color: #505050 !important;
        }

        .cj_gnb_hamburger {
            display: none;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .cj_hamburger {
            color: #111111 !important;
            font-size: 20px;
        }

        .cj_menu_item {
            position: relative;
            height: 80px;
            display: flex;
            align-items: center;
        }

        .cj_lnb_box {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            min-width: 160px;
            padding: 28px 20px;
            background-color: #ffffff;
            border: 1px solid #e5e5ec;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 15;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .cj_menu_item:hover .cj_lnb_box {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }

        .cj_lnb {
            display: block;
            font-family: 'Paperozi';
            font-size: 16px;
            font-weight: 400;
            color: #111111 !important;
            text-decoration: none;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .cj_lnb:hover {
            color: #2e50e2 !important;
        }

        .cj_bgmenu_box {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 50;
            width: 100vw;
            height: 100vh;
            background-color: #2e50e2;
            padding: 60px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 40px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(-100%);
            transition: all 0.45s ease;
        }

        .cj_bgmenu_box.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateY(0);
        }

        .cj_bgmenu_top {
            display: flex;
            justify-content: flex-end;
        }

        .cj_bgmenu_top i {
            color: #ffffff;
            font-size: 20px;
            cursor: pointer;
        }

        .cj_bgmenu_middle {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .cj_bgmenu {
            font-family: 'Paperozi';
            font-size: 20px;
            font-weight: 400;
            color: #ffffff !important;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            border-bottom: 1px solid #ffffff;
            padding: 4px 0;
        }

        .cj_bgmenu:hover {
            color: #dddddd !important;
        }

        .cj_bgmenu_item {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .cj_bg_second {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }

        .cj_bg_2nd {
            font-family: 'Paperozi';
            font-size: 14px;
            font-weight: 400;
            color: #e7e7e7 !important;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .cj_bg_2nd:hover {
            color: #cacaca !important;
        }

        .cj_bg_logo1 {
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
        }

        .cj_bg_logo1>img {
            width: 100%;
            height: 100%;
        }

        @media (min-width: 1025px) {
            .cj_bgmenu_box {
                display: none;
            }
        }

        @media (max-width: 1024px) {
            .cj_gnb_menu {
                display: none;
            }

            .cj_gnb_hamburger {
                display: flex;
                cursor: pointer;
            }

            .cj_gnb_container {
                position: fixed !important;
                top: 0;
                z-index: 14;
            }
        }

        /* ✅ 768px 이하 */
        @media screen and (max-width: 768px) {

            .cj_gnb_container {
                height: 60px;
            }

            .cj_gnb_wrapper {
                padding: 0 20px 0 12px;
            }

            .cj_logo {
                width: 109px;
                height: 34px;
            }
        }

        /* ✅ 440px 이하 */
        @media screen and (max-width: 440px) {}
    </style>
</head>

<body>

    <section class="cj_gnb_container">

        <div class="cj_gnb_wrapper">

            <div class="cj_gnb_box">
                <a href="main" class="cj_logo">
                    <img src="https://cdn.imweb.me/thumbnail/20260523/00249b66e20c9.png" alt="">
                </a>
                <div class="cj_gnb_menu">
                    <a href="" class="cj_menu">스토리</a>
                    <div class="cj_menu_item">
                        <a href="" class="cj_menu">청소안내</a>

                        <div class="cj_lnb_box">
                            <a href="/promotion1" class="cj_lnb">입주/이사 청소</a>
                            <a href="/promotion2" class="cj_lnb">에어컨분해 청소</a>
                            <a href="/promotion3" class="cj_lnb">인테리어/거주 청소</a>
                            <a href="/promotion4" class="cj_lnb">오피스/상가 청소</a>
                            <a href="/km" class="cj_lnb">컬비&amp;미코</a>
                        </div>
                    </div>
                    <a href="/coverage" class="cj_menu">청소범위</a>
                    <a href="/faq" class="cj_menu">자주묻는질문</a>
                </div>
                <div class="cj_gnb_hamburger">
                    <i class="fa-regular fa-bars cj_hamburger"></i>
                </div>
            </div>

            <div class="cj_bgmenu_box">
                <div class="cj_bgmenu_top">
                    <i class="fa-regular fa-xmark"></i>
                </div>
                <div class="cj_bgmenu_middle">
                    <a href="" class="cj_bgmenu">스토리</a>
                    <div class="cj_bgmenu_item">
                        <a href="" class="cj_bgmenu">청소안내</a>
                        <div class="cj_bg_second">
                            <a href="/promotion1" class="cj_bg_2nd">입주/이사 청소</a>
                            <a href="/promotion2" class="cj_bg_2nd">에어컨분해 청소 청소</a>
                            <a href="/promotion3" class="cj_bg_2nd">인테리어/거주 청소</a>
                            <a href="/promotion4" class="cj_bg_2nd">오피스/상가 청소</a>
                            <a href="/km" class="cj_bg_2nd">컬비&amp;미코</a>
                        </div>
                    </div>
                    <a href="/coverage" class="cj_bgmenu">청소범위</a>
                    <a href="/faq" class="cj_bgmenu">자주묻는질문</a>
                </div>
                <div class="cj_bg_logo1">
                    <img src="https://cdn.imweb.me/thumbnail/20260523/5d9916aff2820.png" alt="">
                </div>
            </div>

        </div>

    </section>

    <script>
        const cjHamburger = document.querySelector('.cj_gnb_hamburger');
        const cjBgMenu = document.querySelector('.cj_bgmenu_box');
        const cjBgClose = document.querySelector('.cj_bgmenu_top i');

        cjHamburger.addEventListener('click', function () {
            cjBgMenu.classList.add('active');
        });

        cjBgClose.addEventListener('click', function () {
            cjBgMenu.classList.remove('active');
        });
    </script>

</body>

</html>
